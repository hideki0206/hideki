name: Scheduled Post to Threads

on:
  schedule:
    - cron: '0 22 * * *'   # 朝07:00 JST
    - cron: '0 3 * * *'    # 昼12:00 JST
    - cron: '0 10 * * *'   # 夜19:00 JST
  workflow_dispatch:
    inputs:
      time_slot:
        description: '投稿スロット (morning/noon/evening)'
        required: true
        default: 'morning'

jobs:
  post:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Download generated posts
        uses: actions/download-artifact@v4
        with:
          name: generated-posts
        continue-on-error: true

      - name: Determine time slot
        id: slot
        run: |
          HOUR=$(TZ=Asia/Tokyo date +%H)
          if [ "$HOUR" = "07" ]; then
            echo "slot=morning" >> $GITHUB_OUTPUT
          elif [ "$HOUR" = "12" ]; then
            echo "slot=noon" >> $GITHUB_OUTPUT
          else
            echo "slot=evening" >> $GITHUB_OUTPUT
          fi

      - name: Post to Threads
        env:
          CHATWORK_API_TOKEN: ${{ secrets.CHATWORK_API_TOKEN }}
          CHATWORK_ROOM_ID: ${{ secrets.CHATWORK_ROOM_ID }}
          THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
          THREADS_USER_ID: ${{ secrets.THREADS_USER_ID }}
        run: |
          SLOT="${{ github.event.inputs.time_slot || steps.slot.outputs.slot }}"
          python main.py post $SLOT
