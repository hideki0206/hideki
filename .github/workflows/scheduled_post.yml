name: Scheduled Post to Threads

on:
  schedule:
    - cron: '0 22 * * *'   # 朝07:00 JST
    - cron: '0 3 * * *'    # 昼12:00 JST
    - cron: '0 10 * * *'   # 夜19:00 JST
  workflow_dispatch:
    inputs:
      time_slot:
        description: '投稿スロット (morning/noon/evening)'
        required: true
        default: 'morning'

jobs:
  post:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download generated posts via GitHub API
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          curl -s -H "Authorization: token $GH_TOKEN" \
            -H "Accept: application/vnd.github.v3.raw" \
            "https://api.github.com/repos/${{ github.repository }}/contents/generated_posts.json?ref=data" \
            -o generated_posts.json
          echo "ダウンロード完了"
          cat generated_posts.json | python3 -c "import sys,json; d=json.load(sys.stdin); print(f'{len(d)}件の投稿を取得')"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium
          playwright install-deps chromium

      - name: Determine time slot
        id: slot
        run: |
          HOUR=$(TZ=Asia/Tokyo date +%H)
          if [ "$HOUR" = "07" ]; then
            echo "slot=morning" >> $GITHUB_OUTPUT
          elif [ "$HOUR" = "12" ]; then
            echo "slot=noon" >> $GITHUB_OUTPUT
          else
            echo "slot=evening" >> $GITHUB_OUTPUT
          fi

      - name: Post to Threads
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CHATWORK_API_TOKEN: ${{ secrets.CHATWORK_API_TOKEN }}
          CHATWORK_ROOM_ID: ${{ secrets.CHATWORK_ROOM_ID }}
          THREADS_USERNAME: ${{ secrets.THREADS_USERNAME }}
          THREADS_PASSWORD: ${{ secrets.THREADS_PASSWORD }}
          THREADS_SESSION: ${{ secrets.THREADS_SESSION }}
        run: |
          SLOT="${{ github.event.inputs.time_slot || steps.slot.outputs.slot }}"
          python main.py post $SLOT

      - name: Save updated posts to data branch (revision反映)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SHA=$(curl -s -H "Authorization: token $GH_TOKEN" \
            "https://api.github.com/repos/${{ github.repository }}/contents/generated_posts.json?ref=data" \
            | python3 -c "import sys,json; print(json.load(sys.stdin).get('sha',''))" 2>/dev/null || echo "")
          CONTENT=$(base64 -w 0 generated_posts.json)
          if [ -n "$SHA" ]; then
            PAYLOAD="{\"message\":\"Update posts after revision\",\"content\":\"$CONTENT\",\"branch\":\"data\",\"sha\":\"$SHA\"}"
          else
            PAYLOAD="{\"message\":\"Update posts after revision\",\"content\":\"$CONTENT\",\"branch\":\"data\"}"
          fi
          curl -s -X PUT -H "Authorization: token $GH_TOKEN" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" \
            "https://api.github.com/repos/${{ github.repository }}/contents/generated_posts.json" > /dev/null
          echo "data ブランチ更新完了"
