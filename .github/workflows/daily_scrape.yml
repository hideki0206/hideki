name: Daily Scrape & Generate

on:
  schedule:
    - cron: '0 21 * * *'  # 毎日06:00 JST（UTC+9）
  workflow_dispatch:  # 手動実行も可能

jobs:
  scrape-and-generate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium
          playwright install-deps chromium

      - name: Run scrape and generate
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CHATWORK_API_TOKEN: ${{ secrets.CHATWORK_API_TOKEN }}
          CHATWORK_ROOM_ID: ${{ secrets.CHATWORK_ROOM_ID }}
        run: python main.py scrape

      - name: Save generated posts as artifact
        uses: actions/upload-artifact@v4
        with:
          name: generated-posts
          path: generated_posts.json
          retention-days: 1
