name: Daily Scrape & Generate

on:
  schedule:
    - cron: '0 21 * * *'  # 毎日06:00 JST（UTC+9）
  workflow_dispatch:  # 手動実行も可能

jobs:
  scrape-and-generate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium
          playwright install-deps chromium

      - name: Run scrape and generate
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CHATWORK_API_TOKEN: ${{ secrets.CHATWORK_API_TOKEN }}
          CHATWORK_ROOM_ID: ${{ secrets.CHATWORK_ROOM_ID }}
        run: python main.py scrape

      - name: Save generated posts via GitHub API
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          CONTENT=$(base64 -w 0 generated_posts.json)
          SHA=$(curl -s -H "Authorization: token $GH_TOKEN" \
            "https://api.github.com/repos/${{ github.repository }}/contents/generated_posts.json?ref=data" \
            | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('sha',''))" 2>/dev/null || echo "")

          if [ -n "$SHA" ]; then
            PAYLOAD="{\"message\":\"Update generated posts\",\"content\":\"$CONTENT\",\"branch\":\"data\",\"sha\":\"$SHA\"}"
          else
            PAYLOAD="{\"message\":\"Update generated posts\",\"content\":\"$CONTENT\",\"branch\":\"data\"}"
          fi

          curl -s -X PUT -H "Authorization: token $GH_TOKEN" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" \
            "https://api.github.com/repos/${{ github.repository }}/contents/generated_posts.json"
          echo "保存完了"
