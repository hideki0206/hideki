name: Daily Scrape & Generate

on:
  schedule:
    - cron: '0 21 * * *'  # 毎日06:00 JST（UTC+9）
  workflow_dispatch:  # 手動実行も可能

jobs:
  scrape-and-generate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium
          playwright install-deps chromium

      - name: Run scrape and generate
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CHATWORK_API_TOKEN: ${{ secrets.CHATWORK_API_TOKEN }}
          CHATWORK_ROOM_ID: ${{ secrets.CHATWORK_ROOM_ID }}
        run: python main.py scrape

      - name: Save generated posts to data branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin data 2>/dev/null || git checkout --orphan data && git rm -rf . --quiet 2>/dev/null || true
          git checkout data 2>/dev/null || true
          cp generated_posts.json /tmp/generated_posts.json
          git checkout data -- . 2>/dev/null || (git checkout --orphan data && git rm -rf . --quiet)
          cp /tmp/generated_posts.json generated_posts.json
          git add generated_posts.json
          git commit -m "Update generated posts $(date -u '+%Y-%m-%d %H:%M')" || echo "No changes"
          git push origin data
